name: Build Latest Redis ARM64

on:
  workflow_dispatch: # 手动触发

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install ARM64 Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu build-essential

      - name: Checkout Latest Redis
        uses: actions/checkout@v4
        with:
          repository: redis/redis
          ref: stable # 始终指向最新稳定版
          fetch-depth: 1

      - name: Compile Redis for ARM64
        run: |
          # 使用交叉编译器 aarch64-linux-gnu-gcc
          # MALLOC=libc 提高跨环境兼容性
          make CC=aarch64-linux-gnu-gcc MALLOC=libc -j$(nproc)

      - name: Verify Architecture
        run: file src/redis-server

      - name: Upload ARM64 Binaries
        uses: actions/upload-artifact@v4
        with:
          name: redis-latest-linux-arm64
          path: |
            src/redis-server
            src/redis-cli
            src/redis-benchmark
