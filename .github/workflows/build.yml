name: Build Redis 7.4 RPM for Kylin V10

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    container:
      image: debian:10
    
    steps:
      - name: Prepare Environment
        run: |
          # 1. 修复 Debian 10 归档源
          sed -i 's/deb.debian.org/archive.debian.org/g' /etc/apt/sources.list
          sed -i 's/security.debian.org/archive.debian.org/g' /etc/apt/sources.list
          sed -i '/buster-updates/d' /etc/apt/sources.list
          
          apt-get update
          # 安装编译工具和 RPM 打包工具
          apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            build-essential \
            git \
            ruby ruby-dev rubygems rpm

          # 安装 fpm (用于快速生成 RPM)
          gem install --no-document fpm

      - name: Clone Redis 7.4
        run: |
          git clone --depth 1 --branch 7.4 https://github.com/redis/redis.git source
      
      - name: Compile Redis for ARM64
        working-directory: ./source
        run: |
          make \
            CC=aarch64-linux-gnu-gcc \
            CXX=aarch64-linux-gnu-g++ \
            AR=aarch64-linux-gnu-ar \
            RANLIB=aarch64-linux-gnu-ranlib \
            MALLOC=libc \
            -j$(nproc)

      - name: Prepare Package Files
        run: |
          # 创建 RPM 安装后的目录结构
          mkdir -p build/usr/bin/
          mkdir -p build/etc/redis/
          mkdir -p build/var/lib/redis/
          mkdir -p build/var/log/redis/
          mkdir -p build/usr/lib/systemd/system/

          # 1. 复制二进制文件 (由于旧版在 /usr/sbin，这里建议复制两份或建立软链接)
          cp source/src/redis-server build/usr/bin/
          cp source/src/redis-cli build/usr/bin/
          cp source/src/redis-benchmark build/usr/bin/
          cp source/src/redis-check-rdb build/usr/bin/
          cp source/src/redis-check-aof build/usr/bin/

          # 2. 复制配置文件 (使用 7.4 新版作为默认配置)
          cp source/redis.conf build/etc/redis/redis.conf.default

          # 3. 创建 Systemd 服务文件 (兼容旧版服务名)
          cat <<EOF > build/usr/lib/systemd/system/redis.service
          [Unit]
          Description=Redis In-Memory Data Store (7.4)
          After=network.target

          [Service]
          User=redis
          Group=redis
          ExecStart=/usr/bin/redis-server /etc/redis/redis.conf
          ExecStop=/usr/bin/redis-cli shutdown
          Restart=always
          Type=forking

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Build RPM Package
        run: |
          # 使用 FPM 封装成 RPM
          # --pre-install: 安装前创建 redis 用户
          # --post-install: 安装后设置目录权限
          fpm -s dir -t rpm \
            -n redis \
            -v 7.4.0 \
            --iteration 1.kylinv10 \
            --architecture aarch64 \
            --description "Redis 7.4.0 Stable for Kylin V10 ARM64 (GLIBC 2.28)" \
            -C build \
            --before-install <(echo "useradd -r -s /sbin/nologin redis || true") \
            --after-install <(echo "chown -R redis:redis /var/lib/redis /var/log/redis /etc/redis") \
            usr/bin etc/redis var/lib/redis var/log/redis usr/lib/systemd/system/redis.service

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: redis-7.4.0-arm64-rpm
          path: "*.rpm"
