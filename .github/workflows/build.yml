name: Build Redis 7.4 ARM64 (High Compatibility)

on:
  workflow_dispatch:

jobs:
  build-arm64:
    # 关键修改：改用 Ubuntu 20.04，其 GLIBC 版本较低，兼容性更好
    runs-on: ubuntu-20.04
    
    steps:
      - name: Install ARM64 Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            build-essential

      - name: Manual Clone Redis 7.4
        run: |
          git clone --depth 1 --branch 7.4 https://github.com/redis/redis.git source
      
      - name: Compile Redis for ARM64
        working-directory: ./source
        run: |
          # 依然使用之前的全工具链指定
          make \
            CC=aarch64-linux-gnu-gcc \
            CXX=aarch64-linux-gnu-g++ \
            AR=aarch64-linux-gnu-ar \
            RANLIB=aarch64-linux-gnu-ranlib \
            MALLOC=libc \
            -j$(nproc)

      - name: Upload ARM64 Binaries
        uses: actions/upload-artifact@v4
        with:
          name: redis-7.4-kailin-v10-arm64
          path: |
            source/src/redis-server
            source/src/redis-cli
