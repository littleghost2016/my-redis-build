name: Build Latest Redis ARM64

on:
  workflow_dispatch:

jobs:
  build-arm64:
    # 关键点：这里必须是 ubuntu-latest，确保进入 Linux 环境
    runs-on: ubuntu-latest
    
    steps:
      - name: Install ARM64 Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu build-essential

      - name: Checkout Redis
        uses: actions/checkout@v4
        with:
          repository: redis/redis
          ref: stable 
          fetch-depth: 1

      - name: Compile Redis for ARM64
        run: |
          # 现在在 Linux 环境下，$(nproc) 和路径都会正常工作
          make CC=aarch64-linux-gnu-gcc MALLOC=libc -j$(nproc)

      - name: Upload ARM64 Binaries
        uses: actions/upload-artifact@v4
        with:
          name: redis-latest-linux-arm64
          path: |
            src/redis-server
            src/redis-cli
