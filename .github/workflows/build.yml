name: Build Latest Redis ARM64

on:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install ARM64 Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu build-essential

      - name: Manual Clone Redis
        run: |
          git clone --depth 1 --branch unstable https://github.com/redis/redis.git source
      
      - name: Compile Redis for ARM64
        working-directory: ./source
        run: |
          # 强制指定核心数，确保参数传递正确
          make CC=aarch64-linux-gnu-gcc MALLOC=libc -j$(nproc)

      - name: Upload ARM64 Binaries
        uses: actions/upload-artifact@v4
        with:
          name: redis-latest-linux-arm64
          path: |
            source/src/redis-server
            source/src/redis-cli
