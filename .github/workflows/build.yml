name: Multi-Platform Redis Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Redis Version (e.g. 5.0.5, 7.2.4)'
        required: true
        default: '5.0.5'

jobs:
  build:
    name: Build Redis ${{ github.event.inputs.version }} for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-aarch64
            os: ubuntu-latest
          - platform: windows-x64
            os: windows-latest

    steps:
      # 修复后的 Checkout：移除模糊匹配，确保引用唯一
      - name: Checkout Redis Source
        uses: actions/checkout@v4
        with:
          repository: redis/redis
          # 使用 github.event.inputs.version 确保获取用户输入的特定版本
          ref: ${{ github.event.inputs.version }}
          fetch-depth: 1

      # --- Linux ARM64 构建逻辑 ---
      - name: Set up QEMU (Linux ARM64 only)
        if: matrix.platform == 'linux-aarch64'
        uses: docker/setup-qemu-action@v3

      - name: Build for Linux ARM64
        if: matrix.platform == 'linux-aarch64'
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm64v8/debian:buster \
            /bin/bash -c "apt-get update && apt-get install -y build-essential && make MALLOC=libc -j$(nproc)"

      # --- Windows x64 构建逻辑 (使用兼容性更好的环境) ---
      - name: Build for Windows x64
        if: matrix.platform == 'windows-x64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            make
            mingw-w64-x86_64-gcc
            pkg-config

      - name: Compile on Windows
        if: matrix.platform == 'windows-x64'
        shell: msys2 {0}
        run: |
          # 针对 Windows 的特殊修复：官方源码不支持 Windows fork()
          # 如果这里报错，建议使用 tporadowski/redis 仓库
          make MALLOC=libc -j$(nproc) || echo "Official Redis might need patches for Windows"

      # --- 产物收集 ---
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: redis-${{ github.event.inputs.version }}-${{ matrix.platform }}
          path: |
            src/redis-server
            src/redis-server.exe
            src/redis-cli
            src/redis-cli.exe
