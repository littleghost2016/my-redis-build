name: Build Redis 7.4 for Kylin V10

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    container:
      image: debian:10
    
    steps:
      - name: Install Build Tools
        run: |
          # 1. 修复 Debian 10 归档源
          sed -i 's/deb.debian.org/archive.debian.org/g' /etc/apt/sources.list
          sed -i 's/security.debian.org/archive.debian.org/g' /etc/apt/sources.list
          sed -i '/buster-updates/d' /etc/apt/sources.list
          
          apt-get update
          apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            build-essential \
            git

      - name: Clone Redis 7.4
        run: |
          git clone --depth 1 --branch 7.4 https://github.com/redis/redis.git source
      
      - name: Compile Redis for ARM64
        working-directory: ./source
        run: |
          make \
            CC=aarch64-linux-gnu-gcc \
            CXX=aarch64-linux-gnu-g++ \
            AR=aarch64-linux-gnu-ar \
            RANLIB=aarch64-linux-gnu-ranlib \
            MALLOC=libc \
            -j$(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: redis-7.4-kylin-v10-arm64
          path: |
            source/src/redis-server
            source/src/redis-cli
            source/src/redis-benchmark
            source/src/redis-check-rdb
            source/src/redis-check-aof
